<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lietuvos Naujienos - Pradinis Puslapis</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>📰 Lietuvos Naujienos</h1>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </header>

    <nav>
        <button class="active" onclick="filtruoti('Visos')">Visos</button>
        <button onclick="filtruoti('Lietuva')">🏠 Lietuva</button>
        <button onclick="filtruoti('Pasaulis')">🌍 Pasaulis</button>
        <button onclick="filtruoti('Technologijos')">💻 Technologijos</button>
        <button onclick="filtruoti('Sportas')">⚽ Sportas</button>
        <button onclick="filtruoti('Verslas')">💼 Verslas</button>
    </nav>

    <section id="search">
        <input type="text" id="news-search" placeholder="Ieškoti naujienų...">
    </section>

    <main>
        <div id="news-list">
            <!-- News articles will be dynamically loaded here -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Lietuvos Naujienos. Visos teisės saugomos.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
